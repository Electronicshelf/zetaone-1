<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZataOne — Compliance check</title>
  <style>
    :root { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 1.25rem; }
    h1 { font-size: 1.35rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; margin-top: 0.25rem; padding: 0.5rem; }
    textarea { min-height: 100px; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    pre { background: #f4f4f4; padding: 1rem; overflow: auto; font-size: 0.85rem; border-radius: 6px; }
    .row { margin-top: 0.5rem; }
    .err { color: #b00020; }
    .muted { color: #555; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>ZataOne — compliance check</h1>
  <p class="muted">Calls your API: <code>POST /assets</code> → poll <code>GET /assets/{id}</code>. Configure CORS on the server for this page’s origin.</p>

  <label for="base">API base URL (no trailing slash)</label>
  <input id="base" type="text" placeholder="https://your-service-xxx.run.app or http://127.0.0.1:8000" />

  <div class="row">
    <label><input type="radio" name="mode" value="text" checked /> Text</label>
    <label><input type="radio" name="mode" value="image" /> Image file</label>
  </div>

  <div id="textBlock">
    <label for="content">Content</label>
    <textarea id="content" placeholder="Paste ad copy to check…"></textarea>
  </div>

  <div id="imageBlock" style="display:none;">
    <label for="file">Image</label>
    <input id="file" type="file" accept="image/*" />
  </div>

  <button type="button" id="run">Run check</button>

  <label style="margin-top:1.5rem;">Result</label>
  <pre id="out">(not run yet)</pre>

  <script>
    const $ = (id) => document.getElementById(id);
    const base = () => $("base").value.replace(/\/$/, "");
    document.querySelectorAll('input[name="mode"]').forEach((r) => {
      r.addEventListener("change", () => {
        const text = document.querySelector('input[name="mode"]:checked').value === "text";
        $("textBlock").style.display = text ? "block" : "none";
        $("imageBlock").style.display = text ? "none" : "block";
      });
    });

    async function poll(assetId) {
      const b = base();
      const max = 60;
      for (let i = 0; i < max; i++) {
        const r = await fetch(b + "/assets/" + assetId);
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || r.statusText);
        if (data.status === "completed") return data;
        await new Promise((x) => setTimeout(x, 1000));
      }
      throw new Error("Timeout waiting for completion");
    }

    $("run").onclick = async () => {
      const b = base();
      $("out").textContent = "…";
      if (!b) {
        $("out").innerHTML = '<span class="err">Set API base URL first.</span>';
        return;
      }
      try {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let assetId;
        if (mode === "text") {
          const content = $("content").value;
          const r = await fetch(b + "/assets", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content, type: "text" }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(JSON.stringify(data));
          assetId = data.asset_id;
        } else {
          const f = $("file").files[0];
          if (!f) throw new Error("Choose an image file");
          const fd = new FormData();
          fd.append("file", f);
          const r = await fetch(b + "/assets/image", { method: "POST", body: fd });
          const data = await r.json();
          if (!r.ok) throw new Error(JSON.stringify(data));
          assetId = data.asset_id;
        }
        $("out").textContent = "Processing… asset_id=" + assetId;
        const verdict = await poll(assetId);
        $("out").textContent = JSON.stringify(verdict, null, 2);
      } catch (e) {
        $("out").innerHTML = '<span class="err">' + (e.message || String(e)) + "</span>";
      }
    };
  </script>
</body>
</html>
